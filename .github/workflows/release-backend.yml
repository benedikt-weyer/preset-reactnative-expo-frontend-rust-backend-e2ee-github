name: Release Backend

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: release-backend-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}-backend

jobs:
  create-tags:
    runs-on: ubuntu-latest

    outputs:
      created_releases: ${{ steps.version.outputs.created_releases }}
      created_release_count: ${{ steps.version.outputs.created_release_count }}
      final_tag: ${{ steps.version.outputs.final_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate and create release tags
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags origin '+refs/heads/main:refs/remotes/origin/main'

          is_semver_tag() {
            [[ "$1" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]
          }

          set_version_from_tag() {
            local tag="$1"
            if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Tag '$tag' is not a valid semantic version" >&2
              exit 1
            fi

            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          }

          next_version_for_subject() {
            local subject="$1"

            if [[ "$subject" =~ ^feat(\([^)]+\))?!: ]]; then
              major=$((major + 1))
              minor=0
              patch=0
            elif [[ "$subject" =~ ^feat(\([^)]+\))?: ]]; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi

            printf 'v%s.%s.%s' "$major" "$minor" "$patch"
          }

          major=0
          minor=0
          patch=0
          have_version=0
          final_tag=''
          final_commit=''
          created_tags=()
          created_releases_json='[]'
          summary_lines=()

          mapfile -t commits < <(git rev-list --first-parent --reverse origin/main)

          if [[ "${#commits[@]}" -eq 0 ]]; then
            echo 'No commits found on origin/main' >&2
            exit 1
          fi

          for commit in "${commits[@]}"; do
            existing_tag=''

            while IFS= read -r tag; do
              if is_semver_tag "$tag"; then
                existing_tag="$tag"
              fi
            done < <(git tag --points-at "$commit" | sort -V)

            if [[ -n "$existing_tag" ]]; then
              set_version_from_tag "$existing_tag"
              have_version=1
              final_tag="$existing_tag"
              final_commit="$commit"
              summary_lines+=("$existing_tag $commit existing")
              continue
            fi

            if [[ "$have_version" -eq 0 ]]; then
              have_version=1
            fi

            subject="$(git log -1 --format=%s "$commit")"
            next_tag="$(next_version_for_subject "$subject")"

            if git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null; then
              tagged_commit="$(git rev-list -n 1 "$next_tag")"
              if [[ "$tagged_commit" != "$commit" ]]; then
                echo "Computed tag $next_tag for $commit, but that tag already points to $tagged_commit" >&2
                exit 1
              fi
            else
              created_tags+=("$next_tag::$commit")
            fi

            final_tag="$next_tag"
            final_commit="$commit"
            summary_lines+=("$next_tag $commit $subject")
          done

          if [[ -z "$final_tag" || "$final_commit" != "${commits[-1]}" ]]; then
            echo 'Failed to derive a release tag for HEAD on main' >&2
            exit 1
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [[ "${#created_tags[@]}" -gt 0 ]]; then
            push_args=()

            for entry in "${created_tags[@]}"; do
              tag_name="${entry%%::*}"
              tag_commit="${entry##*::}"

              git tag -a "$tag_name" "$tag_commit" -m "Release $tag_name"
              push_args+=("refs/tags/$tag_name")
            done

            git push origin "${push_args[@]}"
          fi

          created_releases_json='['
          for index in "${!created_tags[@]}"; do
            entry="${created_tags[$index]}"
            tag_name="${entry%%::*}"
            tag_commit="${entry##*::}"

            if [[ "$index" -gt 0 ]]; then
              created_releases_json+=','
            fi

            created_releases_json+="{\"tag\":\"$tag_name\",\"commit\":\"$tag_commit\"}"
          done
          created_releases_json+=']'

          {
            echo "created_releases=$created_releases_json"
            echo "created_release_count=${#created_tags[@]}"
            echo "final_tag=$final_tag"
            echo "final_commit=$final_commit"
          } >> "$GITHUB_OUTPUT"

          {
            echo 'release_plan<<EOF'
            printf '%s\n' "${summary_lines[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        run: |
          {
            echo '## Backend release'
            echo
            echo "Final tag: ${{ steps.version.outputs.final_tag }}"
            echo
            echo "New tags created: ${{ steps.version.outputs.created_release_count }}"
            echo
            echo 'Processed commits:'
            echo
            while IFS= read -r line; do
              echo "- $line"
            done <<< "${{ steps.version.outputs.release_plan }}"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-images:
    needs: create-tags
    if: ${{ needs.create-tags.outputs.created_release_count != '0' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        release: ${{ fromJson(needs.create-tags.outputs.created_releases) }}

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.release.commit }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.release.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ matrix.release.commit }}
            org.opencontainers.image.version=${{ matrix.release.tag }}

      - name: Write publish summary
        run: |
          {
            echo '## Published backend image'
            echo
            echo "Tag: ${{ matrix.release.tag }}"
            echo "Commit: ${{ matrix.release.commit }}"
            echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.release.tag }}"
          } >> "$GITHUB_STEP_SUMMARY"